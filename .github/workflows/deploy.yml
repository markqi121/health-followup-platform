name: Deploy to Server

on:
  push:
    branches: [ master, main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: backend/package-lock.json

    - name: Install dependencies
      run: |
        cd backend
        npm ci

    - name: Run tests
      run: |
        cd backend
        npm test

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Deploy to Server
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.SSH_HOST }}
        username: ${{ secrets.SSH_USERNAME }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        port: ${{ secrets.SSH_PORT || 22 }}
        script: |
          set -e
          echo "=========================================="
          echo "🚀 开始部署健康随访包平台"
          echo "=========================================="

          # 进入项目目录
          cd /opt/health-followup-platform

          # 备份当前版本（用于回滚）
          echo "📦 备份当前版本..."
          BACKUP_DIR="/opt/backups/health-followup-$(date +%Y%m%d-%H%M%S)"
          mkdir -p "$BACKUP_DIR"
          cp -r backend "$BACKUP_DIR/" 2>/dev/null || true
          cp -r frontend "$BACKUP_DIR/" 2>/dev/null || true

          # 拉取最新代码
          echo "📥 拉取最新代码..."
          git fetch origin
          git reset --hard origin/master

          # 安装依赖
          echo "📦 安装依赖..."
          cd backend
          npm ci --production

          # 数据库迁移（如果有）
          echo "🗄️ 检查数据库..."
          if [ -f "../database/migrate.js" ]; then
            node ../database/migrate.js || true
          fi

          # 重启服务
          echo "🔄 重启服务..."
          pm2 restart ecosystem.config.js --env production || pm2 start ecosystem.config.js

          # 健康检查
          echo "🏥 健康检查..."
          sleep 3
          if curl -sf http://localhost:3000/health > /dev/null; then
            echo "✅ 服务运行正常"
          else
            echo "❌ 健康检查失败，准备回滚..."
            pm2 stop health-followup-api || true
            echo "⚠️ 请手动检查并恢复备份: $BACKUP_DIR"
            exit 1
          fi

          # 清理旧备份（保留最近5个）
          ls -1td /opt/backups/health-followup-* 2>/dev/null | tail -n +6 | xargs rm -rf 2>/dev/null || true

          echo "=========================================="
          echo "🎉 部署成功！"
          echo "=========================================="
          echo ""
          pm2 status

    - name: Notify on failure
      if: failure()
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.SSH_HOST }}
        username: ${{ secrets.SSH_USERNAME }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          echo "❌ GitHub Actions 部署失败，请检查日志"